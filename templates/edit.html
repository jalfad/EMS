<!DOCTYPE html>
<html>
    <head>
        <title>Edit Employee</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    </head>
    <body>
    <div class = "container mt-5">
        <h2>Edit Employee</h2>
        
        <form method="POST">
        <div class="mb-3">
            <input 
                class="form-control"
                type="text"
                name="employee_no"
                value="{{employee.employee_no}}"
                required
        
            >
        </div>
        <div class="mb-3">
            <input 
                class="form-control"
                type="text"
                name="first_name"
                value="{{employee.first_name}}"
                required
            >
        </div>
        <div class="mb-3">
            <input
                class="form-control"
                type="text"
                name="last_name"
                value="{{employee.last_name}}"
                required
            >
        </div>
        <div class="mb-3">
            <input 
            class="form-control" 
            type="text" 
            name="email"
            value="{{employee.email}}"
            required
            >
        </div>
        <div class="mb-3">
            <select name="department" class="form-control">
                <option 
                    value="IT"
                    {% if employee.department == 'IT' %}
                    selected
                    {% endif %}
                >
                    IT
                </option>
            
           
                <option 
                    value="HR"
                    {% if employee.department == 'HR' %}
                    selected
                    {% endif %}
                >

                HR

                </option>
            
                <option 
                    value="Accounting"
                    {% if employee.department == 'Accounting' %}
                    selected
                    {% endif %}>
                    Accounting

                </option>
            
                <option 
                    value="Finance"
                    {% if employee.department == 'Finance' %}
                    selected
                    {% endif %}>
                    Finance

                </option>
            </select>

        </div>
        <div class="mb-3">
            <input 
            class="form-control"
            type="text"
            name="position"
            value="{{ employee.position}}"
            required>

        </div>
        <div class="mb-3">
           <select name="status" class="form-control">
            <option 
                value="Active"
                {% if employee.status == 'Active' %}
                selected
                {% endif %}
            >
                Active
            </option>
            <option
                value="Inactive"
                {% if employee.status == 'InActive'%}
                selected
                {% endif %}>
                Inactive
            </option>
           </select>
        </div>

            <button class="btn btn-success" type="submit"> Save </button>
            <button class="btn btn-secondary" type="submit"> Back </button>
        </form>
        <!--<br>
        <a href="/">Back</a> -->
    </div>
    </body>
</html>
