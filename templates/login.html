<!DOCTYPE html>
<html>
    <head>
        <title>
            Login
        </title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    </head>
    <body>
        
        <div class="container mt-5">
            <h2>Login</h2>

        </div>
        <form method="POST">
            <div class="mb-3">
                <input 
                class="form-control"
                type="text"
                name="username"
                placeholder="username"
                required
                >

            </div>
            <div class="mb-3">
                <input 
                class="form-control"
                type="password"
                name="password"
                placeholder="Password"
                required>
            </div>
            <button class="btn btn-primary" type="submit">Login</button>
        </form>
    </body>
</html>
